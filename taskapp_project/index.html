<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="taskapp.css">
    <script src="taskapp.js" defer></script>
</head>
<body>
    <main class="app-shell" aria-label="Task manager application">
        <header>
            <h1>📝 Task Manager</h1>
            <p>Stay organized. Stay productive.</p>
        </header>
        <form class="task-form" id="taskForm" aria-label="Add a new task">
            <div class="row">
                <label for="title">
                    Task
                    <input type="text" id="title" name="title" placeholder="Enter task name" required>
                </label>
                <label for="dueDate">
                    Due Date
                    <input type="date" id="dueDate" name="dueDate" aria-label="Task due date">
                </label>
            </div>
            <label for="priority" class="full">
                Priority
                <select id="priority" name="priority">
                    <option value="High">HIGH</option>
                    <option value="Normal">NORMAL</option>
                    <option value="Low">LOW</option>
                </select>
            </label>
            <button type="submit" class="add-btn">+ Add Task</button>
        </form>
        <div class="counters" aria-hidden="false">
            <div class="counter">
                <div class="label">Total</div>
                <div class="value" id="totalCount">12</div>
            </div>
            <div class="counter">
                <div class="label">Pending</div>
                <div class="value" id="pendingCount">5</div>
            </div>
            <div class="counter">
                <div class="label">Completed</div>
                <div class="value" id="completedCount">7</div>
            </div>
        </div>
        <ul class="task-list" id="taskList" aria-live="polite"></ul>
    </main>
    
</body>
</html>
